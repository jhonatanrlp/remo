<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globus Esportes</title>
  <link rel="icon" href="../remo.png" type="image/x-icon">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="site-header"></div>
  <script src="header.js"></script>

  <main class="news-listing">
    <p class="section-label">Últimas Notícias</p>
    <div id="hero-area"></div>

    <div class="ad-banner">
      <span class="ad-banner__label">Publicidade</span>
      <img src="anuncio.jpg" alt="Anúncio" />
    </div>

    <div class="news-grid" id="news-grid"><div class="loading">Carregando notícias…</div></div>
  </main>

  <!-- Modal de texto -->
  <div id="news-modal" class="modal-overlay" onclick="closeModal(event,'news-modal')">
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('news-modal').classList.remove('modal-open')">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Lightbox de foto -->
  <div id="photo-modal" class="modal-overlay photo-modal-overlay" onclick="closeModal(event,'photo-modal')">
    <button class="modal-close photo-modal-close" onclick="document.getElementById('photo-modal').classList.remove('modal-open')">✕</button>
    <img id="photo-modal-img" class="photo-modal-img" alt="" />
  </div>

  <footer>
    <span class="footer-brand">Globus</span>
    <p>© 2026 Globus Esportes</p>
    <p>OSM · Liga</p>
  </footer>

  <script>
  function openModal(n) {
    const paras = (n.body || '').split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    document.getElementById('modal-content').innerHTML = `
      <span class="modal-label">${n.label}</span>
      <h2 class="modal-title">${n.title}</h2>
      <div class="modal-meta">${n.date}</div>
      ${n.img ? `<img class="modal-img" src="${n.img}" alt="" onerror="this.style.display='none'">` : ''}
      <div class="modal-body">${paras}</div>
    `;
    const m = document.getElementById('news-modal');
    m.classList.add('modal-open');
    m.scrollTop = 0;
  }
  function openPhoto(src) {
    document.getElementById('photo-modal-img').src = src;
    document.getElementById('photo-modal').classList.add('modal-open');
  }
  function closeModal(e, id) {
    if (e.target === document.getElementById(id))
      document.getElementById(id).classList.remove('modal-open');
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('news-modal').classList.remove('modal-open');
      document.getElementById('photo-modal').classList.remove('modal-open');
    }
  });

  function cardTag(n) { return n.file ? 'a' : 'div'; }
  function isClickable(n) { return !!(n.file || n.body || n.img); }

  function buildCard(n, isHero, isSide) {
    const tag = cardTag(n);
    const el = document.createElement(tag);
    if (n.file) {
      el.href = n.file;
    } else {
      el.setAttribute('role','button');
      el.setAttribute('tabindex','0');
      el.style.cursor = 'pointer';
      if (n.body) {
        el.onclick = () => openModal(n);
      } else if (n.img) {
        el.onclick = () => openPhoto(n.img);
      }
    }
    return el;
  }

  fetch('data/noticias.json')
    .then(r => r.json())
    .then(noticias => {
      const heroArea = document.getElementById('hero-area');
      const grid     = document.getElementById('news-grid');
      grid.innerHTML = '';

      const destaque = noticias[0];
      const resto    = noticias.slice(1);
      const side1    = resto[0];
      const side2    = resto[1];

      function heroAttrs(n) {
        if (n.file) return `href="${n.file}"`;
        if (n.body) return `role="button" tabindex="0" style="cursor:pointer" onclick="openModal(${JSON.stringify(n).replace(/"/g,'&quot;')})"`;
        if (n.img)  return `role="button" tabindex="0" style="cursor:pointer" onclick="openPhoto('${n.img}')"`;
        return '';
      }

      const hTag = cardTag(destaque);
      const s1Tag = side1 ? cardTag(side1) : 'div';
      const s2Tag = side2 ? cardTag(side2) : 'div';

      heroArea.innerHTML = `
        <div class="hero-layout">
          <${hTag} class="hero-card${isClickable(destaque) ? ' hero-card--link' : ''}" ${heroAttrs(destaque)}>
            ${destaque.img
              ? `<img class="hero-card__img" src="${destaque.img}" alt="" onerror="this.outerHTML='<div class=&quot;hero-card__color-bg&quot;></div>'">`
              : `<div class="hero-card__color-bg"></div>`}
            <div class="hero-card__overlay">
              <span class="hero-card__badge">${destaque.label}</span>
              <p class="hero-card__title">${destaque.title}</p>
            </div>
          </${hTag}>
          <div class="side-stack">
            ${side1 ? `
            <${s1Tag} class="side-card${isClickable(side1) ? ' side-card--link' : ''}" ${heroAttrs(side1)}>
              ${side1.img
                ? `<img class="side-card__img" src="${side1.img}" alt="" onerror="this.outerHTML='<div class=&quot;side-card__color-bg&quot;></div>'">`
                : `<div class="side-card__color-bg"></div>`}
              <div class="side-card__overlay"><p class="side-card__title">${side1.title}</p></div>
            </${s1Tag}>` : ''}
            ${side2 ? `
            <${s2Tag} class="side-card${isClickable(side2) ? ' side-card--link' : ''}" ${heroAttrs(side2)}>
              ${side2.img
                ? `<img class="side-card__img" src="${side2.img}" alt="" onerror="this.outerHTML='<div class=&quot;side-card__color-bg&quot;></div>'">`
                : `<div class="side-card__color-bg"></div>`}
              <div class="side-card__overlay"><p class="side-card__title">${side2.title}</p></div>
            </${s2Tag}>` : ''}
          </div>
        </div>
      `;

      /* Separar artigos (file) de publicações (body/img) */
      const artigos = resto.slice(2).filter(n => n.file);
      const pubs    = resto.slice(2).filter(n => !n.file);

      if (artigos.length) {
        const sec = document.createElement('div');
        sec.className = 'news-section';
        sec.innerHTML = '<p class="section-label section-label--article">📰 Artigos & Reportagens</p>';
        const ag = document.createElement('div');
        ag.className = 'news-grid news-grid--articles';
        artigos.forEach(n => {
          const card = document.createElement('a');
          card.className = 'news-card news-card--article news-card--link';
          card.href = n.file;
          card.innerHTML = `
            ${n.img
              ? `<img class="news-card__thumb" src="${n.img}" alt="" onerror="this.outerHTML='<div class=&quot;news-card__thumb-placeholder&quot;></div>'">`
              : `<div class="news-card__thumb-placeholder"></div>`}
            <div class="news-card__body">
              <span class="news-card__artbadge">ARTIGO</span>
              <span class="news-card__label">${n.label}</span>
              <span class="news-card__title">${n.title}</span>
              ${n.subtitle ? `<span class="news-card__subtitle">${n.subtitle}</span>` : ''}
              <span class="news-card__cta">Ler artigo →</span>
              <span class="news-card__date">${n.date}</span>
            </div>
          `;
          ag.appendChild(card);
        });
        sec.appendChild(ag);
        grid.appendChild(sec);
      }

      if (pubs.length) {
        const sec = document.createElement('div');
        sec.className = 'news-section';
        sec.innerHTML = '<p class="section-label">Notícias</p>';
        const pg = document.createElement('div');
        pg.className = 'news-grid';
        pubs.forEach(n => {
          const card = buildCard(n);
          const clickable = isClickable(n);
          card.className = 'news-card' + (clickable ? ' news-card--link' : '');
          card.innerHTML = `
            ${n.img
              ? `<img class="news-card__thumb" src="${n.img}" alt="" onerror="this.outerHTML='<div class=&quot;news-card__thumb-placeholder&quot;></div>'">`
              : `<div class="news-card__thumb-placeholder"></div>`}
            <div class="news-card__body">
              <span class="news-card__label">${n.label}</span>
              <span class="news-card__title">${n.title}</span>
              ${n.body ? '<span class="news-card__read">Leia mais →</span>' : ''}
              <span class="news-card__date">${n.date}</span>
            </div>
          `;
          pg.appendChild(card);
        });
        sec.appendChild(pg);
        grid.appendChild(sec);
      }
    })
    .catch(() => {
      document.getElementById('news-grid').innerHTML = '<p style="color:#888;padding:20px">Erro ao carregar notícias.</p>';
    });
  </script>

</body>
</html>
