<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Times — Globus Esportes</title>
  <link rel="icon" href="logo_globus.png" type="image/x-icon">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="site-header"></div>
  <script src="header.js"></script>

  <main class="times-page">
    <div class="times-page__heading">
      <h1 id="page-title">Times &amp; Técnicos</h1>
      <a class="times-page__back" id="back-btn" href="#" onclick="showAllTeams();return false;">← Voltar aos times</a>
    </div>

    <!-- Grade de times -->
    <div class="times-grid" id="times-grid"></div>

    <!-- Painel de notícias do time selecionado -->
    <div id="team-news-panel">
      <div class="news-grid" id="team-news-grid"></div>
    </div>
  </main>

  <footer>
    <span class="footer-brand">Globus</span>
    <p>© 2026 Globus Esportes</p>
    <p>OSM · Liga</p>
  </footer>

  <script>
  const TIMES = [
    { id: 'atletico-mg',  nome: 'Atlético-MG',   manager: 'Coutinho',       status: 'active' },
    { id: 'athletico-pr', nome: 'Athletico-PR',   manager: '—',              status: 'empty'  },
    { id: 'bahia',        nome: 'Bahia',          manager: 'Jurandir',       status: 'active' },
    { id: 'botafogo',     nome: 'Botafogo',       manager: 'PROIBIDO 🚫',   status: 'banned' },
    { id: 'bragantino',   nome: 'Bragantino',     manager: 'Leonardo',       status: 'active' },
    { id: 'chapecoense',  nome: 'Chapecoense',    manager: '—',              status: 'empty'  },
    { id: 'corinthians',  nome: 'Corinthians',    manager: 'Sayro',          status: 'active' },
    { id: 'coritiba',     nome: 'Coritiba',       manager: 'Zaquieu',        status: 'active' },
    { id: 'cruzeiro',     nome: 'Cruzeiro',       manager: 'Lemos',          status: 'active' },
    { id: 'flamengo',     nome: 'Flamengo',       manager: 'PP',             status: 'active' },
    { id: 'fluminense',   nome: 'Fluminense',     manager: 'Pedro',          status: 'active' },
    { id: 'gremio',       nome: 'Grêmio',         manager: 'Felipe',         status: 'active' },
    { id: 'inter',        nome: 'Internacional',  manager: 'Pietro Quadros', status: 'active' },
    { id: 'mirassol',     nome: 'Mirassol',       manager: 'Rafael',         status: 'active' },
    { id: 'palmeiras',    nome: 'Palmeiras',      manager: 'João Victor',    status: 'active' },
    { id: 'remo',         nome: 'Remo',           manager: 'Jhonatanrlp',    status: 'active' },
    { id: 'santos',       nome: 'Santos',         manager: 'Wanderson',      status: 'active' },
    { id: 'sao-paulo',    nome: 'São Paulo',      manager: 'Duarte',         status: 'active' },
    { id: 'vasco',        nome: 'Vasco',          manager: 'Kadu',           status: 'active' },
    { id: 'vitoria',      nome: 'Vitória',        manager: 'Yzzy',           status: 'active' },
  ];

  const badgeLabel = { active: '✅ Ativo', empty: 'Vaga aberta', banned: 'Banido' };
  let allNoticias = [];

  fetch('data/noticias.json')
    .then(r => r.json())
    .then(data => { allNoticias = data; })
    .catch(() => {});

  function buildTeamGrid() {
    const grid = document.getElementById('times-grid');
    grid.innerHTML = '';
    TIMES.forEach(t => {
      const card = document.createElement('div');
      card.className = 'team-card' + (t.status === 'banned' ? ' team-card--banned' : t.status === 'empty' ? ' team-card--empty' : '');
      card.innerHTML = `
        <span class="team-card__role">Técnico</span>
        <span class="team-card__name">${t.nome}</span>
        <span class="team-card__manager">${t.manager}</span>
        <span class="team-card__badge">${badgeLabel[t.status]}</span>
      `;
      card.addEventListener('click', () => showTeamNews(t));
      grid.appendChild(card);
    });
  }

  function showTeamNews(time) {
    document.getElementById('page-title').textContent = time.nome;
    document.getElementById('back-btn').classList.add('visible');

    const panel = document.getElementById('team-news-panel');
    const newsGrid = document.getElementById('team-news-grid');
    panel.style.display = 'block';

    // Scroll suave até o painel
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const noticias = allNoticias.filter(n => n.teams && n.teams.includes(time.id));

    if (noticias.length === 0) {
      newsGrid.innerHTML = '<p class="no-news">Nenhuma notícia encontrada para este time ainda.</p>';
      return;
    }

    newsGrid.innerHTML = '';
    noticias.forEach(n => {
      const card = document.createElement('div');
      card.className = 'news-card';
      card.innerHTML = `
        ${n.img
          ? `<img class="news-card__thumb" src="${n.img}" alt="" onerror="this.outerHTML='<div class=&quot;news-card__thumb-placeholder&quot;>FOTO</div>'">`
          : `<div class="news-card__thumb-placeholder">FOTO</div>`}
        <div class="news-card__body">
          <span class="news-card__label">${n.label}</span>
          <span class="news-card__title">${n.title}</span>
          <span class="news-card__date">${n.date}</span>
        </div>
      `;
      newsGrid.appendChild(card);
    });
  }

  function showAllTeams() {
    document.getElementById('page-title').textContent = 'Times & Técnicos';
    document.getElementById('back-btn').classList.remove('visible');
    document.getElementById('team-news-panel').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  buildTeamGrid();
  </script>

</body>
</html>
