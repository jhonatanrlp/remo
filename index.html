<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clube do Remo — Comunicados</title>
  <link rel="icon" href="remo.png" type="image/x-icon">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="site-header"></div>
  <script src="header.js"></script>

  <main class="news-listing">
    <div class="news-listing__header">
      <h1 class="news-listing__title">Comunicados Oficiais</h1>
      <span class="news-listing__count" id="news-count"></span>
    </div>

    <!-- ═══════════════════════════════════════════════════
         ADICIONAR NOTÍCIAS AQUI — copie um bloco <a> abaixo
         mais novo primeiro (ordem cronológica inversa)
    ════════════════════════════════════════════════════ -->
    <div class="news-grid" id="news-grid">

      <a class="news-card" href="plata.html">
        <div class="news-card__thumb-placeholder">
          <img src="escudo.png" alt="" onerror="this.style.display='none'" />
        </div>
        <div class="news-card__body">
          <span class="news-card__label">Contratação</span>
          <span class="news-card__title">Bem-vindo Gonzalo Plata, o novo atacante do Leão</span>
          <span class="news-card__date">14/06/2026</span>
        </div>
      </a>

      <a class="news-card" href="jhonatanrlp.html">
        <div class="news-card__thumb-placeholder">
          <img src="escudo.png" alt="" onerror="this.style.display='none'" />
        </div>
        <div class="news-card__body">
          <span class="news-card__label">Comunicado Oficial</span>
          <span class="news-card__title">Jhonatanrlp é o novo treinador do Clube do Remo</span>
          <span class="news-card__date">14/06/2026</span>
        </div>
      </a>

    </div>
  </main>

  <footer>
    <p>© 2026 Clube do Remo</p>
    <p>OSM · Liga</p>
  </footer>

  <script>
    const count = document.getElementById('news-grid').querySelectorAll('.news-card').length;
    document.getElementById('news-count').textContent = count + (count === 1 ? ' notícia' : ' notícias');
  </script>

</body>
</html>
